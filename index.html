<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherScope - Advanced 3D Weather App</title>
    <meta name="description" content="Experience weather like never before with our advanced 3D weather application featuring real-time data, stunning visualizations, and smooth animations." />
    <style>
      /* Preloader styles */
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, #3b82f6, #06b6d4, #eab308);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .preloader-hidden {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div id="preloader" class="preloader">
      <div style="color: white; font-size: 24px; font-weight: bold;">Loading WeatherScope...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide preloader when page loads
      window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.classList.add('preloader-hidden');
          setTimeout(() => {
            preloader.remove();
          }, 500);
        }
      });
    </script>
  </body>
</html>
