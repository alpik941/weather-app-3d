<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherScope - Advanced 3D Weather App</title>
    <meta name="description" content="Experience weather like never before with our advanced 3D weather application featuring real-time data, stunning visualizations, and smooth animations." />
    <style>
      /* Preloader styles */
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #14b8a6 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        animation: fadeInBackground 0.8s ease-in-out;
      }
      .preloader-hidden {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease;
      }
      @keyframes fadeInBackground {
        from {
          opacity: 0;
          transform: scale(1.05);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      /* Loading text animation */
      .loading-text {
        color: white;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div id="preloader" class="preloader">
      <div class="loading-text">Loading WeatherScope...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide preloader when page loads
      window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.classList.add('preloader-hidden');
          setTimeout(() => {
            preloader.remove();
          }, 500);
        }
      });
    </script>
  </body>
</html>
